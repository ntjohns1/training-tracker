# Local dev infrastructure for the `dev` Spring profile.
#   docker compose up -d
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
services:
  postgres:
    image: postgres:16
    container_name: training-tracker-postgres
    environment:
      POSTGRES_DB: training_tracker
      POSTGRES_USER: noslen
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - training-tracker-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noslen -d training_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    container_name: training-tracker-kafka
    ports:
      - "9092:9092"
    environment:
      # Single-node KRaft (no ZooKeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Dev convenience: let the app's topics be created on first use
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  training-tracker-pgdata:
