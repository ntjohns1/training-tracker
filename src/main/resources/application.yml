# Conversion to YAML from Properties formar report
# Warnings:
# - The yaml file had comments which are lost in the refactoring!
spring:
  application:
    name: training-tracker
  jackson:
    default-property-inclusion: always
  datasource:
    url: jdbc:postgresql://localhost:5432/training_tracker
    username: noslen
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      # Flyway owns the schema now; Hibernate only validates the entity model against it.
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    # Adopt the existing (non-empty) dev DB by marking it at V1 without re-running the baseline;
    # fresh databases get V1 applied normally.
    baseline-on-migrate: true
    baseline-version: 1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.nelsonjohns.com/realms/admin
  kafka:
    bootstrap-servers: localhost:9092
# Kafka consumer container startup is opt-in; enabled in the dev profile (which runs a broker).
app:
  kafka:
    consumer:
      auto-startup: false
management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true
