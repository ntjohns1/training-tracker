spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/training_tracker_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    # Tests build the schema via Hibernate create-drop; Flyway must not run in tests.
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.nelsonjohns.com/realms/admin

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
